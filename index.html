<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Wall Clock</title>
  
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="watch-casing">
    <div class="clock-face">
      
      <div class="glass-glare"></div>
      <div class="dial-texture"></div>
      
      <div class="brand-text">
        L U X E
        <div class="brand-subtext">AUTOMATIC</div>
      </div>

      <div class="calendar-window">
        <div class="month-display" id="month-display">JAN</div>
        <div class="date-display" id="date-display">24</div>
      </div>
      
      

      <div class="minute-track"></div>

      <div class="marker-container">
        <div class="marker marker-12"><div class="numeral">XII</div></div>
        <div class="marker marker-1"><div class="baton"></div></div>
        <div class="marker marker-2"><div class="baton"></div></div>
        <div class="marker marker-3"><div class="numeral">III</div></div>
        <div class="marker marker-4"><div class="baton"></div></div>
        <div class="marker marker-5"><div class="baton"></div></div>
        <div class="marker marker-6"><div class="numeral">VI</div></div>
        <div class="marker marker-7"><div class="baton"></div></div>
        <div class="marker marker-8"><div class="baton"></div></div>
        <div class="marker marker-9"><div class="numeral">IX</div></div>
        <div class="marker marker-10"><div class="baton"></div></div>
        <div class="marker marker-11"><div class="baton"></div></div>
      </div>

      <div class="hand hour-hand" id="hour"></div>
      <div class="hand minute-hand" id="minute"></div>
      <div class="hand second-hand" id="second"></div>
      <div class="center-pin"></div>
      
    </div>
  </div>

 
  <script src="script.js"></script>
</body>
</html>
